name: Docker Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  docker-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tag matches project version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          PYPROJECT_VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"

          if [ "${TAG_VERSION}" = "${TAG}" ]; then
            echo "Release tags must start with 'v', got: ${TAG}" >&2
            exit 1
          fi

          if [ "${TAG_VERSION}" != "${PYPROJECT_VERSION}" ]; then
            echo "Tag version ${TAG_VERSION} does not match pyproject version ${PYPROJECT_VERSION}" >&2
            exit 1
          fi

          echo "version=${TAG_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "sha_short=$(git rev-parse --short=12 HEAD)" >> "${GITHUB_OUTPUT}"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/hjenkel/atelierbuddy:${{ steps.version.outputs.version }}
            ghcr.io/hjenkel/atelierbuddy:latest
            ghcr.io/hjenkel/atelierbuddy:sha-${{ steps.version.outputs.sha_short }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.version.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
