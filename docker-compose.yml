services:
  atelier-buddy:
    container_name: atelier-buddy
    build:
      context: .
    ports:
      - "12321:8080"
    environment:
      BM_HOST: "0.0.0.0"
      BM_PORT: "8080"
      BM_OCR_LANGUAGES: "deu+eng"
      PYTHONUNBUFFERED: "1"
    volumes:
      - atelier_buddy_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  atelier_buddy_data:
